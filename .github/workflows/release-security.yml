name: VirusTotal Security Scan

on:
  # Запуск при публикации нового релиза
  release:
    types: [published]
  # Возможность запустить вручную для старых релизов
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Введите тег релиза (например, v1.0.1)'
        required: true

permissions:
  contents: write # Критически важно для обновления описания релиза

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Определяем, какой тег сканировать
      - name: Determine Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      # 2. Скачиваем файлы из релиза (используем надежный GitHub CLI)
      - name: Download Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./downloads
          # Скачиваем все файлы из указанного релиза
          gh release download ${{ steps.vars.outputs.tag }} --dir ./downloads --pattern "*"

      # 3. Отправляем файлы на проверку в VirusTotal
      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./downloads/*
          request_rate: 4 # Ограничение для бесплатного API VT

      # 4. Дописываем ссылку на анализ в описание релиза
      - name: Update Release Description
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          body: |
            
            ---
            ### 🛡️ VirusTotal Security Check
            Все файлы этого релиза прошли автоматическую проверку на вирусы.
            [🔍 Посмотреть полный отчет](${{ steps.vt.outputs.permalink }})
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}