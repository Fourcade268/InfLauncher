name: VirusTotal Check

on:
  release:
    types: [published]
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions
    inputs:
      release_tag:
        description: 'Tag of the release to scan'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  virustotal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Определяем, какой тег использовать: из события релиза или введенный вручную
      - name: Set Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Release Assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: "tags/${{ steps.vars.outputs.tag }}" # Используем выбранный тег
          regex: true
          file: ".*\\.(exe|zip|dmg|apk|tar\\.gz)"
          target: './assets/'

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./assets/*
          request_rate: 4 

      - name: Update Release Description
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }} # Указываем, какой именно релиз обновить
          body: |
            ---
            ### 🛡️ Security Analysis (VirusTotal)
            [🔍 View Full Analysis Report](${{ steps.vt.outputs.permalink }})
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}