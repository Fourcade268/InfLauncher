name: VirusTotal Security Scan

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag of the release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./downloads
          gh release download ${{ steps.vars.outputs.tag }} --dir ./downloads --pattern "*" || echo "No assets found"

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./downloads/*
          request_rate: 4

      # НОВЫЙ ШАГ: Проверка ссылки
      # Если permalink пустой, мы создаем ссылку на поиск по результатам
      - name: Prepare Report Link
        id: report
        run: |
          VT_LINK="${{ steps.vt.outputs.permalink }}"
          if [ -z "$VT_LINK" ]; then
            # Запасной вариант: ссылка на поиск в VT (откроет отчет, если файл уже известен системе)
            echo "link=https://www.virustotal.com/gui/search/${{ steps.vars.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "link=$VT_LINK" >> $GITHUB_OUTPUT
          fi

      - name: Update Release Description
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          body: |
            
            ---
            ### 🛡️ VirusTotal Security Check
            Проверка безопасности пройдена.
            
            🔍 **[Посмотреть полный отчет об анализе](${{ steps.report.outputs.link }})**
            
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}