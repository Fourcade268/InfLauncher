name: VirusTotal Check

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag of the release to scan'
        required: true

permissions:
  contents: write

jobs:
  virustotal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Assets via GH CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./assets
          # Скачиваем только нужные типы файлов (exe, zip, и т.д.)
          # Если хочешь все файлы, используй --pattern "*"
          gh release download ${{ steps.vars.outputs.tag }} --dir ./assets --pattern "*.exe" --pattern "*.zip" --pattern "*.tar.gz"

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./assets/*
          request_rate: 4 

      - name: Update Release Description
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          body: |
            
            ---
            ### 🛡️ Security Analysis
            [🔍 VirusTotal Report](${{ steps.vt.outputs.permalink }})
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}