name: VirusTotal Check

on:
  release:
    types: [published] # Запускается, когда релиз опубликован

jobs:
  virustotal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # В этом шаге мы скачиваем файлы, которые ты уже прикрепил к релизу вручную
      # Либо, если ты собираешь их в этом же Workflow, пропусти этот шаг
      - name: Download Release Assets
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: ${{ github.event.release.id }}
          regex: true
          file: ".*\\.(exe|zip|dmg|apk|tar\\.gz)" # Какие расширения проверять
          target: './assets/'

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./assets/*.exe
            ./assets/*.zip
          # Для бесплатного API лучше добавить задержку, если файлов больше одного
          request_rate: 4 

      - name: Update Release Description
        uses: softprops/action-gh-release@v1
        with:
          # Этот код добавит красивый блок в конец описания твоего релиза
          body: |
            ---
            ### 🛡️ Security Analysis (VirusTotal)
            The files have been scanned and verified.
            [🔍 View Full Analysis Report](${{ steps.vt.outputs.permalink }})
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}